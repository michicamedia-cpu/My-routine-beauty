
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Daily Ritual</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #e8eaf0;
    --card: #ffffff;
    --card2: #f4f5f8;
    --text: #2c3347;
    --text2: #7a8099;
    --text3: #b0b5c8;
    --accent: #4a5478;
    --green: #3d7a5e;
    --dot-am: #c9954a;
    --dot-mid: #5b7abf;
    --dot-night: #7b6baa;
    --dot-hair: #3d7a5e;
    --radius: 16px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app { max-width: 430px; margin: 0 auto; padding: 0 0 3rem; }

  /* HEADER */
  .header { padding: 2rem 1.5rem 1rem; }
  .header-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
  .header-day { font-size: 42px; font-weight: 300; color: var(--text); letter-spacing: -1px; line-height: 1; font-family: Georgia, 'Times New Roman', serif; }
  .header-sub { font-size: 13px; color: var(--text2); margin-top: 6px; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .progress-ring { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--card); stroke-width: 4; }
  .ring-fill { fill: none; stroke: var(--accent); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.4s ease; }
  .ring-label { font-size: 11px; fill: var(--text2); text-anchor: middle; dominant-baseline: middle; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

  /* DAY TABS */
  .day-tabs { display: flex; justify-content: space-between; padding: 0 1.5rem 1.25rem; }
  .day-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px 6px; -webkit-tap-highlight-color: transparent; }
  .day-circle { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .day-letter { font-size: 13px; font-weight: 500; color: var(--text3); }
  .day-btn.active .day-circle { background: var(--accent); }
  .day-btn.active .day-letter { color: #fff; font-weight: 600; }
  .day-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text3); opacity: 0; }
  .day-btn.is-today .day-dot { background: var(--accent); opacity: 1; }

  .divider { height: 0.5px; background: rgba(0,0,0,0.08); margin: 0 1.5rem 1.25rem; }

  /* SECTIONS */
  .sections { padding: 0 1rem; display: flex; flex-direction: column; gap: 10px; }
  .section-card { background: var(--card); border-radius: var(--radius); overflow: hidden; }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; }
  .section-header-left { display: flex; align-items: center; gap: 10px; }
  .sec-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .sec-dot-am { background: var(--dot-am); }
  .sec-dot-mid { background: var(--dot-mid); }
  .sec-dot-night { background: var(--dot-night); }
  .sec-dot-hair { background: var(--dot-hair); }
  .section-title { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text2); }
  .section-count { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
  .chevron { font-size: 10px; color: var(--text3); transition: transform 0.2s; display: inline-block; }
  .section-card.open .chevron { transform: rotate(180deg); }
  .section-body { display: none; border-top: 0.5px solid rgba(0,0,0,0.06); }
  .section-card.open .section-body { display: block; }
  .step { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; border-bottom: 0.5px solid rgba(0,0,0,0.05); cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; transition: opacity 0.15s; }
  .step:last-child { border-bottom: none; }
  .step.done { opacity: 0.4; }
  .step.done .step-name { text-decoration: line-through; }
  .step.dimmed { opacity: 0.35; pointer-events: none; }
  .check-circle { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--text3); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .step.done .check-circle { background: var(--accent); border-color: var(--accent); }
  .check-icon { display: none; }
  .step.done .check-icon { display: block; }
  .step-body-text { flex: 1; }
  .step-name { font-size: 15px; color: var(--text); line-height: 1.3; font-weight: 400; }
  .step-note { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.3; }
  .optional-tag { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text3); background: var(--bg); padding: 2px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }

  /* HAIR SECTION */
  .hair-empty { padding: 16px; }
  .hair-wash-btn { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm, 10px); font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; letter-spacing: 0.3px; -webkit-tap-highlight-color: transparent; }
  .hair-logged { padding: 12px 16px; }
  .hair-type-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--dot-hair); margin-bottom: 4px; }
  .hair-change-btn { font-size: 14px; color: var(--text2); background: var(--bg); border: 0.5px solid var(--text3); border-radius: 10px; font-family: inherit; cursor: pointer; padding: 12px 16px; display: block; width: 100%; margin-top: 10px; text-align: center; -webkit-tap-highlight-color: transparent; }
  .dermroller-note { font-size: 12px; color: #b05a3a; background: #fdf0ea; border-radius: 8px; padding: 8px 12px; margin: 8px 16px 4px; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: 20px 20px 0 0; padding: 1.5rem 1.25rem 2.5rem; width: 100%; max-width: 430px; }
  .modal-title { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text2); margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 1.25rem; }
  .wash-options { display: flex; flex-direction: column; gap: 8px; }
  .wash-opt { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: var(--bg); border-radius: var(--radius); border: none; font-family: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; text-align: left; width: 100%; }
  .wash-opt-emoji { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
  .wash-opt-label { font-size: 15px; font-weight: 500; color: var(--text); }
  .wash-opt-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .modal-cancel { width: 100%; margin-top: 12px; padding: 13px; background: none; border: 0.5px solid var(--text3); border-radius: var(--radius); font-size: 14px; color: var(--text2); font-family: inherit; cursor: pointer; }

  /* K18 BANNER */
  .k18-banner { margin: 0 1rem 10px; background: #dde1ec; border-radius: var(--radius); padding: 14px; display: flex; align-items: center; gap: 14px; }
  .k18-banner-icon-wrap { width: 44px; height: 44px; background: var(--card); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
  .k18-banner-text { flex: 1; min-width: 0; }
  .k18-banner-title { font-size: 14px; font-weight: 700; color: var(--accent); }
  .k18-banner-sub { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.4; }
  .k18-banner-btn { flex-shrink: 0; background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 10px 14px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }

  .footer { text-align: center; padding: 1.5rem; }
  .reset-btn { font-size: 12px; color: var(--text3); background: none; border: none; font-family: inherit; cursor: pointer; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-label">Daily Ritual</div>
        <div class="header-day" id="headerDay">Wednesday</div>
        <div class="header-sub" id="headerSub">0 of 0 steps · Today</div>
      </div>
      <div>
        <svg width="60" height="60" class="progress-ring">
          <circle class="ring-bg" cx="30" cy="30" r="24"/>
          <circle class="ring-fill" cx="30" cy="30" r="24" id="ringFill"
            stroke-dasharray="150.8" stroke-dashoffset="150.8"/>
          <text x="30" y="30" class="ring-label" id="ringLabel"
            transform="rotate(90 30 30)">0%</text>
        </svg>
      </div>
    </div>
  </div>

  <div class="day-tabs" id="dayTabs"></div>
  <div class="divider"></div>
  <div id="k18Banner"></div>
  <div class="sections" id="sections"></div>
  <div class="footer"><button class="reset-btn" onclick="resetDay()">Reset today</button></div>
</div>

<!-- WASH SELECTION MODAL -->
<div class="modal-overlay" id="washModal">
  <div class="modal">
    <div class="modal-title">Hair Wash</div>
    <div class="modal-sub">What does your hair need today?</div>
    <div class="wash-options">
      <button class="wash-opt" onclick="selectWash('clean')">
        <span class="wash-opt-emoji">🌿</span>
        <div><div class="wash-opt-label">Clean</div><div class="wash-opt-sub">Dr. Groot shampoo + scalp treatment</div></div>
      </button>
      <button class="wash-opt" onclick="selectWash('deepclean')">
        <span class="wash-opt-emoji">🧴</span>
        <div><div class="wash-opt-label">Deep Clean</div><div class="wash-opt-sub">Nizoral + Pantene Miracle Mask</div></div>
      </button>
      <button class="wash-opt" onclick="selectWash('hydration')">
        <span class="wash-opt-emoji">💧</span>
        <div><div class="wash-opt-label">Hydration</div><div class="wash-opt-sub">Dove Intensive Moisture shampoo + mask</div></div>
      </button>
      <button class="wash-opt" onclick="selectWash('glossy')">
        <span class="wash-opt-emoji">✨</span>
        <div><div class="wash-opt-label">Glossy</div><div class="wash-opt-sub">EverPure Glossing shampoo + gloss treatment</div></div>
      </button>
      <button class="wash-opt" onclick="selectWash('bond')">
        <span class="wash-opt-emoji">💊</span>
        <div><div class="wash-opt-label">Bond Treatment</div><div class="wash-opt-sub">K18 + Pantene leave-in · no pre-wash</div></div>
      </button>
    </div>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
const DAYS = ['S','M','T','W','T','F','S'];
const FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const CIRC = 2 * Math.PI * 24;

// ── Storage helpers ──────────────────────────────────────────────
function calDateStr(dayIndex) {
  const now = new Date();
  const diff = dayIndex - now.getDay();
  const t = new Date(now);
  t.setDate(now.getDate() + diff);
  return t.toISOString().slice(0, 10);
}
function todayStr() { return new Date().toISOString().slice(0, 10); }
function mondaySundayRange() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  const mon = new Date(now); mon.setDate(now.getDate() - ((day + 6) % 7));
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  return { mon: mon.toISOString().slice(0,10), sun: sun.toISOString().slice(0,10) };
}
function stepKey(d, s, i) { return `dr_${calDateStr(d)}_${s}_${i}`; }
function hairWashKey(d) { return `dr_hair_${calDateStr(d)}`; }
function hairCheckedKey(d, i) { return `dr_hairc_${calDateStr(d)}_${i}`; }
function get(k) { try { return localStorage.getItem(k); } catch(e) { return null; } }
function set(k, v) { try { localStorage.setItem(k, v); } catch(e) {} }

// ── Dermroller tracking ──────────────────────────────────────────
// Stored as JSON array of date strings in current Mon-Sun week
function getDermrollerCount() {
  const key = 'dr_dermroller_week';
  try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch(e) { return []; }
}
function saveDermrollerDates(arr) { set('dr_dermroller_week', JSON.stringify(arr)); }
function cleanDermrollerDates() {
  const { mon, sun } = mondaySundayRange();
  const dates = getDermrollerCount().filter(d => d >= mon && d <= sun);
  saveDermrollerDates(dates);
  return dates;
}
function dermrollerUsedToday() {
  const dates = cleanDermrollerDates();
  return dates.includes(todayStr());
}
function dermrollerCountThisWeek() { return cleanDermrollerDates().length; }
function markDermrollerToday() {
  const dates = cleanDermrollerDates();
  const t = todayStr();
  if (!dates.includes(t)) { dates.push(t); saveDermrollerDates(dates); }
}
function unmarkDermrollerToday() {
  const dates = cleanDermrollerDates().filter(d => d !== todayStr());
  saveDermrollerDates(dates);
}

// ── K18 tracking ─────────────────────────────────────────────────
function getLastK18() { return get('dr_last_k18') || null; }
function setLastK18(dateStr) { set('dr_last_k18', dateStr); }
function daysSinceK18() {
  const last = getLastK18();
  if (!last) return 999;
  const diff = (new Date(todayStr()) - new Date(last)) / 86400000;
  return Math.floor(diff);
}
function k18Dismissed() { return get('dr_k18_dismiss') === todayStr(); }
function dismissK18() { set('dr_k18_dismiss', todayStr()); }

// ── Skincare routine data ─────────────────────────────────────────
const SKINCARE = {
  am: [
    {n:'Vitamin C serum'},
    {n:'Clarins Double Serum'},
    {n:'Anua PDRN 100+ Moisturizing Cream'},
    {n:'EltaMD Tinted SPF 46', x:'Always last — nothing goes over SPF'},
    {n:'Luna Bronze', x:'Optional — only if maintaining a tan', opt:true},
    {n:'The Ordinary Peptide Scalp Serum', x:'Apply to scalp daily'},
  ],
  midday: [
    {n:'Anua PDRN Mist', x:'Light spray, let settle'},
    {n:'Neutrogena Water Gel', x:'Thin layer to rehydrate'},
  ],
  night: {
    A: [ // Sun/Tue/Thu — exfoliation
      {n:'Elemis Cleansing Balm', x:'Step 1 of double cleanse'},
      {n:'Elemis Cleansing Milk', x:'Step 2 of double cleanse'},
      {n:'Elemis Dynamic Resurfacing Pad', x:'Exfoliation night — no azelaic tonight'},
      {n:'Cicalfate+', x:'Recovery — avoid eyelids (lash extensions)'},
      {n:'Heel care cream', opt:true},
    ],
    B: [ // Mon/Wed/Fri — treatment
      {n:'Elemis Cleansing Balm', x:'Step 1 of double cleanse'},
      {n:'Elemis Cleansing Milk', x:'Step 2 of double cleanse'},
      {n:'Azelaic acid 10%', x:'Avoid upper lip area'},
      {n:'Anua Niacinamide 10% + TXA 4%', x:'For cheek pigmentation — pat gently'},
      {n:'The Ordinary Copper Peptide Serum'},
      {n:'Neutrogena Water Gel'},
      {n:"Paula's Choice Peptide Moisturizer"},
    ],
    SAT: [ // Saturday — mask
      {n:'Elemis Cleansing Balm', x:'Step 1 of double cleanse'},
      {n:'Elemis Cleansing Milk', x:'Step 2 of double cleanse'},
      {n:'Dr Jart mask', x:'Weekly mask treat — no actives tonight'},
      {n:'Anua PDRN 100+ Moisturizing Cream'},
      {n:'Heel care cream', opt:true},
    ],
  }
};

function getNightSteps(dayIndex) {
  if (dayIndex === 6) return SKINCARE.night.SAT;
  if ([0,2,4].includes(dayIndex)) return SKINCARE.night.A;
  return SKINCARE.night.B;
}

// ── Hair wash routines ────────────────────────────────────────────
function getHairSteps(washType) {
  const canDermroll = dermrollerCountThisWeek() < 3;
  const dermStep = canDermroll
    ? {n:'Dermroller (scalp)', x:'Before minoxidil — max 3x/week', isDerm:true}
    : null;

  const base = []; // always ends with minoxidil
  const mino = {n:'Foam minoxidil 5%'};

  switch(washType) {
    case 'clean':
      return [
        {n:'OGX Coconut Mist pre-wash', x:'Apply 10 min before shower'},
        {n:'Double shampoo — Dr. Groot'},
        {n:'Dr. Groot scalp treatment', x:'Rinse-out conditioner'},
        ...(dermStep ? [dermStep] : []),
        mino,
      ];
    case 'deepclean':
      return [
        {n:'OGX Coconut Mist pre-wash', x:'Apply 10 min before shower'},
        {n:'Double shampoo — Nizoral', x:'Anti-fungal scalp wash'},
        {n:'Dove Intensive Moisture conditioner'},
        {n:'Pantene Miracle Mask', x:'Leave a few mins, rinse'},
        ...(dermStep ? [dermStep] : []),
        mino,
      ];
    case 'hydration':
      return [
        {n:'OGX Coconut Mist pre-wash', x:'Apply 10 min before shower'},
        {n:'Double shampoo — Dove Intensive Moisture'},
        {n:'Dove Intensive Moisture conditioner'},
        {n:'Dove Intensive Moisture Mask', x:'Leave a few mins, rinse'},
        ...(dermStep ? [dermStep] : []),
        mino,
      ];
    case 'glossy':
      return [
        {n:'OGX Coconut Mist pre-wash', x:'Apply 10 min before shower'},
        {n:'Double shampoo — EverPure Glossing Shampoo'},
        {n:'EverPure Glossing Conditioner'},
        {n:'EverPure 5-min gloss treatment', x:'Leave 5 min, rinse'},
        ...(dermStep ? [dermStep] : []),
        mino,
      ];
    case 'bond':
      return [
        {n:'Double shampoo — Dr. Groot', x:'No pre-wash on K18 days'},
        {n:'K18 treatment', x:'Leave 4 min — do not rinse out'},
        {n:'Pantene leave-in conditioner'},
        ...(dermStep ? [dermStep] : []),
        mino,
      ];
    default: return [];
  }
}

const WASH_LABELS = {
  clean: '🌿 Clean',
  deepclean: '🧴 Deep Clean',
  hydration: '💧 Hydration',
  glossy: '✨ Glossy',
  bond: '💊 Bond Treatment',
};

// ── App state ─────────────────────────────────────────────────────
const today = new Date().getDay();
let active = today;
let checked = {};
let hairChecked = {};
let openSecs = {am:true, midday:false, night:false, hair:false};

function loadChecked(d) {
  checked = {};
  ['am','night'].forEach(s => {
    const steps = s === 'am' ? SKINCARE.am : getNightSteps(d);
    steps.forEach((_,i) => {
      if(get(stepKey(d,s,i)) === '1') checked[s+'_'+i] = true;
    });
  });
  SKINCARE.midday.forEach((_,i) => {
    if(get(stepKey(d,'midday',i)) === '1') checked['midday_'+i] = true;
  });
  // hair
  hairChecked = {};
  const wash = get(hairWashKey(d));
  if(wash) {
    getHairSteps(wash).forEach((_,i) => {
      if(get(hairCheckedKey(d,i)) === '1') hairChecked[i] = true;
    });
  }
}

function saveStep(d,s,i,v) { set(stepKey(d,s,i), v?'1':'0'); }
function saveHairStep(d,i,v) { set(hairCheckedKey(d,i), v?'1':'0'); }

function toggleStep(s,i) {
  const k = s+'_'+i;
  checked[k] = !checked[k];
  saveStep(active,s,i,checked[k]);
  render();
}

function toggleHairStep(i, isDerm) {
  const wash = get(hairWashKey(active));
  if(!wash) return;
  hairChecked[i] = !hairChecked[i];
  saveHairStep(active, i, hairChecked[i]);
  if(isDerm) {
    if(hairChecked[i]) markDermrollerToday();
    else unmarkDermrollerToday();
  }
  render();
}

function resetDay() {
  if(!confirm('Reset all steps for '+FULL[active]+'?')) return;
  ['am','midday','night'].forEach(s => {
    const steps = s==='am' ? SKINCARE.am : s==='midday' ? SKINCARE.midday : getNightSteps(active);
    steps.forEach((_,i) => { checked[s+'_'+i]=false; saveStep(active,s,i,false); });
  });
  hairChecked = {};
  set(hairWashKey(active), null);
  render();
}

// ── Modal ─────────────────────────────────────────────────────────
function openModal() { document.getElementById('washModal').classList.add('open'); }
function closeModal() { document.getElementById('washModal').classList.remove('open'); }
function selectWash(type) {
  closeModal();
  const prev = get(hairWashKey(active));
  if(prev && prev !== type) {
    // clear previous hair step checks if changing type
    const prevSteps = getHairSteps(prev);
    prevSteps.forEach((_,i) => set(hairCheckedKey(active,i), '0'));
    hairChecked = {};
  }
  set(hairWashKey(active), type);
  if(type === 'bond') setLastK18(calDateStr(active));
  render();
  setTimeout(()=>{
    const el = document.getElementById('sec-hair');
    if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }, 80);
}

// ── K18 banner ────────────────────────────────────────────────────
function renderK18Banner() {
  const el = document.getElementById('k18Banner');
  const days = daysSinceK18();
  if(days >= 12 && !k18Dismissed()) {
    const daysText = days === 999 ? 'No K18 wash logged yet — start your 12-day cycle.' : `It's been ${days} days since your last bond treatment.`;
    el.innerHTML = `
      <div class="k18-banner">
        <div class="k18-banner-icon-wrap">💊</div>
        <div class="k18-banner-text">
          <div class="k18-banner-title">Bond treatment due</div>
          <div class="k18-banner-sub">${daysText}</div>
        </div>
        <button class="k18-banner-btn" onclick="openSecs.hair=true; selectWash('bond');">Log K18</button>
      </div>`;
  } else {
    el.innerHTML = '';
  }
}

// ── Count helpers ─────────────────────────────────────────────────
function countSkincare(d) {
  let total=0, done=0;
  ['am','midday','night'].forEach(s => {
    const steps = s==='am' ? SKINCARE.am : s==='midday' ? SKINCARE.midday : getNightSteps(d);
    steps.forEach((_,i) => { total++; if(checked[s+'_'+i]) done++; });
  });
  return {total,done};
}
function countHair(d) {
  const wash = get(hairWashKey(d));
  if(!wash) return {total:0,done:0};
  const steps = getHairSteps(wash);
  let total=steps.length, done=0;
  steps.forEach((_,i) => { if(hairChecked[i]) done++; });
  return {total,done};
}
function countAll(d) {
  const s = countSkincare(d); const h = countHair(d);
  return {total: s.total+h.total, done: s.done+h.done};
}
function countSec(s) {
  if(s==='hair') return countHair(active);
  const steps = s==='am' ? SKINCARE.am : s==='midday' ? SKINCARE.midday : getNightSteps(active);
  let total=steps.length, done=0;
  steps.forEach((_,i) => { if(checked[s+'_'+i]) done++; });
  return {total,done};
}

// ── Tabs ──────────────────────────────────────────────────────────
function buildTabs() {
  const el = document.getElementById('dayTabs');
  el.innerHTML = '';
  DAYS.forEach((d,i) => {
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (i===active?' active':'') + (i===today?' is-today':'');
    btn.innerHTML = `<div class="day-circle"><span class="day-letter">${d}</span></div><div class="day-dot"></div>`;
    btn.onclick = () => { active=i; loadChecked(i); openSecs={am:true,midday:false,night:false,hair:false}; render(); buildTabs(); };
    el.appendChild(btn);
  });
}

// ── Main render ───────────────────────────────────────────────────
function render() {
  const isToday = active === today;
  document.getElementById('headerDay').textContent = FULL[active];
  const {total,done} = countAll(active);
  const pct = total ? Math.round(done/total*100) : 0;
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  document.getElementById('headerSub').textContent = `${done} of ${total} steps · ${isToday?'Today, '+dateStr:FULL[active]}`;
  const offset = CIRC - (pct/100)*CIRC;
  document.getElementById('ringFill').style.strokeDashoffset = offset;
  document.getElementById('ringLabel').textContent = pct+'%';

  renderK18Banner();

  const cont = document.getElementById('sections');
  cont.innerHTML = '';

  const SECS = [
    {key:'am',     label:'Morning',        dot:'sec-dot-am'},
    {key:'midday', label:'Midday Refresh',  dot:'sec-dot-mid'},
    {key:'night',  label:'Night',           dot:'sec-dot-night'},
    {key:'hair',   label:'Hair',            dot:'sec-dot-hair'},
  ];

  SECS.forEach(({key:s, label, dot}) => {
    const {total:st, done:sd} = countSec(s);
    const isOpen = openSecs[s];
    const card = document.createElement('div');
    card.className = 'section-card' + (isOpen?' open':'');
    card.id = 'sec-'+s;

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `
      <div class="section-header-left">
        <div class="sec-dot ${dot}"></div>
        <span class="section-title">${label}</span>
      </div>
      <div class="section-count">${sd} / ${st} <span class="chevron">▼</span></div>`;
    hdr.onclick = () => {
      const wasOpen = openSecs[s];
      Object.keys(openSecs).forEach(k => openSecs[k]=false);
      openSecs[s] = !wasOpen;
      render();
      if(!wasOpen) setTimeout(()=>{ const el=document.getElementById('sec-'+s); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); }, 50);
    };
    card.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'section-body';

    if(s === 'hair') {
      renderHairBody(body);
    } else {
      const steps = s==='am' ? SKINCARE.am : s==='midday' ? SKINCARE.midday : getNightSteps(active);
      steps.forEach((step,i) => {
        const isDone = !!checked[s+'_'+i];
        const div = document.createElement('div');
        div.className = 'step' + (isDone?' done':'');
        div.onclick = () => toggleStep(s,i);
        div.innerHTML = `
          <div class="check-circle">
            <svg class="check-icon" width="12" height="9" viewBox="0 0 12 9" fill="none">
              <path d="M1 4.5L4.5 8L11 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="step-body-text">
            <div class="step-name">${step.n}${step.opt?'<span class="optional-tag">Optional</span>':''}</div>
            ${step.x?`<div class="step-note">${step.x}</div>`:''}
          </div>`;
        body.appendChild(div);
      });
    }

    card.appendChild(body);
    cont.appendChild(card);
  });
}

function renderHairBody(body) {
  const wash = get(hairWashKey(active));
  const dCount = dermrollerCountThisWeek();

  if(!wash || wash === 'null') {
    const wrap = document.createElement('div');
    wrap.className = 'hair-empty';
    wrap.innerHTML = `<button class="hair-wash-btn" onclick="openModal()">+ Log a hair wash</button>`;
    body.appendChild(wrap);
    return;
  }

  // dermroller note if maxed
  if(dCount >= 3 && !dermrollerUsedToday()) {
    const note = document.createElement('div');
    note.className = 'dermroller-note';
    note.textContent = `Dermroller skipped — already used 3× this week`;
    body.appendChild(note);
  }

  const steps = getHairSteps(wash);
  steps.forEach((step,i) => {
    const isDone = !!hairChecked[i];
    const div = document.createElement('div');
    div.className = 'step' + (isDone?' done':'');
    div.onclick = () => toggleHairStep(i, !!step.isDerm);
    div.innerHTML = `
      <div class="check-circle">
        <svg class="check-icon" width="12" height="9" viewBox="0 0 12 9" fill="none">
          <path d="M1 4.5L4.5 8L11 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="step-body-text">
        <div class="step-name">${step.n}</div>
        ${step.x?`<div class="step-note">${step.x}</div>`:''}
      </div>`;
    body.appendChild(div);
  });

  // logged label + change button
  const logged = document.createElement('div');
  logged.className = 'hair-logged';
  logged.innerHTML = `
    <div class="hair-type-label">${WASH_LABELS[wash]}</div>
    <button class="hair-change-btn" onclick="openModal();">Change wash type</button>`;
  body.appendChild(logged);
}

// ── Init ──────────────────────────────────────────────────────────
loadChecked(active);
buildTabs();
render();
</script>
</body>
</html>
